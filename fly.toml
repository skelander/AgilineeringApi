app = "agilineering-rikard"
primary_region = "arn"

[build]

[env]
  ASPNETCORE_ENVIRONMENT = "Production"
  ConnectionStrings__DefaultConnection = "Data Source=/data/agilineering.db"
  Cors__Origins__0 = "https://skelander.github.io"
  Cors__Origins__1 = "https://agilineering.com"
  Site__BaseUrl = "https://agilineering.com"

[[mounts]]
  source = "agilineering_data"
  destination = "/data"

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.http_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/health"
    protocol = "http"

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1


